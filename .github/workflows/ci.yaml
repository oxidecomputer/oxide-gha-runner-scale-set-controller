---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Development Environment
        run: nix develop --command go version

      - name: Lint
        run: >-
          nix develop --command
          go tool -modfile=tools/go.mod golangci-lint run ./...

      - name: Test
        run: nix develop --command go test ./...

      - name: Build
        run: >-
          nix develop --command
          go build -trimpath -o /tmp/oxide-actions-scaleset .
